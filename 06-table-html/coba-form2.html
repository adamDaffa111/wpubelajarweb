<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Attribut pada form yang sering digunakan </title>
</head>

<body>
   <h1> attribute form </h1>
   <form>
      <label for="nama">Nama : </label>
      <input type="text" id="nama" name="nama" placeholder="Masukkan Nama" required autofocus
         autocomplete="off"><br><br>
      <label for="Email">Email : </label>
      <input type="Email" id="Email" name="Email" placeholder="Masukkan Email" required><br><br>
      <label for="hobi">Hobi : </label>
      <input type="checkbox" name="hobi" value="membaca" checked>
      <input type="checkbox" name="hobi" value="futsal">
      <input type="checkbox" name="hobi" value="basket">
      <br>
      <label for="laki-laki">
         <input type="radio" name="gender" id="laki-laki" value="laki-laki" checked>
         laki-laki
      </label>
      <label for="Perempuan">
         <input type="radio" name="gender" value="perempuan" id="Perempuan" checked>
         Perempuan
      </label> <br>
      <input type="submit" value="Submit">

   </form>
</body>

</html>
