<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Coba Form 3</title>
</head>

<body>
   <form>
      <label for="kota-asal"> kota asal: </label>
      <select id="kota-asal" name="asal-kota">
         <option value="">
            --Masukan Kota asal--
         </option>
         <option value="bdg">
            bandung
         </option>
         <option value="jkt">
            jakarta
         </option>
         <option value="bks">
            bekasi
         </option>
         <option value="crb">
            cirebon
         </option>
         <option value="kng">
            kuningan
         </option>
      </select><br>
      <label for="comment"> pesan </label> <br>
      <textarea name="pesan" id="comment" cols="100" rows="10" placeholder="masukan pesan..."></textarea>
   </form>

</body>

</html>
