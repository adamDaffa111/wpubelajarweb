<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Form HTML</title>
</head>

<body>
   <h1>Form HTML</h1>
   <form>
      <label for="name">Name:</label>
      <input type="text" id="name" name="name"><br><br>
      <label for="email">Email:</label>
      <input type="email" id="email" name="email"><br><br>
      <label for="password"> Password: </label>
      <input type="password" id="password" name="password"><br><br>
      <label for="phone">Phone:</label>
      <input type="Phone" id="phone" name="phone" placeholder="Phone Number"><br><br>
      <label for="age">Age:</label>
      <input type="number" id="age" name="age" min="1" max="100">
      <label for="dob">Date of Birthday : </label>
      <input type="date" id="dob" name="dob"><br><br>

      <label>
         Gender:<br>
         <input type="radio" id="gender1" name="gender" value="male">
         <label for="gender1"> Male</label>
         <input type="radio" id="gender2" name="gender" value="female">
         <label for="gender2"> female</label>
      </label><br><br>
      <label>
         Hobi : <br>
         <input type="checkbox" id="hobi1" name="hobi" value="membaca">
         <label for="hobi1"> Membaca</label><br>
         <input type="checkbox" id="hobi2" name="hobi" value="menulis">
         <label for="hobi2"> Menulis</label><br>
         <input type="checkbox" id="hobi3" name="hobi" value="menonton">
         <label for="hobi3"> menonton</label><br>
         <input type="checkbox" id="hobi4" name="hobi" value="hiking">
         <label for="hobi4"> hiking</label><br><br>
      </label>
      <input type="file" id="file" name="file"><br><br>
      <label for="color">Choose your favorite color:</label>
      <input type="color" id="color" name="color"><br><br>
      <label for="country">Country:</label>
      <input type="text" id="country" name="country"><br><br>
      <label for="message">Message:</label><br>
      <textarea id="message" name="message" rows="4" cols="50"></textarea><br><br>
      <input type="submit" value="Submit">
      <input type="reset" value="Reset">

   </form>
</body>

</html>
