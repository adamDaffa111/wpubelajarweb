<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Form HTML</title>
</head>

<body>
   <h1>Form HTML</h1>

   <form>
      <table>
         <tr>
            <td> <label for="name">Name:</label>
            </td>
            <td> <input type="text" id="name" name="name">
            </td>
         </tr>
         <tr>
            <td> <label for="email">Email:</label>
            </td>
            <td> <input type="email" id="email" name="email">
            </td>
         </tr>
         <tr>
            <td> <label for="password"> Password: </label>
            </td>
            <td> <input type="password" id="password" name="password">
            </td>
         </tr>
         <tr>
            <td> <label for="phone">Phone:</label>
            </td>
            <td> <input type="Phone" id="phone" name="phone" placeholder="Phone Number">
            </td>
         </tr>
         <tr>
            <td> <label for="age">Age:</label>
            </td>
            <td> <input type="number" id="age" name="age" min="1" max="100">
            </td>
         </tr>
         <tr>
            <td> <label for="dob">Date of Birthday : </label>
            </td>
            <td> <input type="date" id="dob" name="dob">
            </td>
         </tr>
         <tr>
            <td><label for="dob">Gender : </label>
            </td>

            <td> <input type="radio" id="gender1" name="gender" value="male"><label for="gender1"> Male</label>
               <input type="radio" id="gender2" name="gender" value="female"><label for="gender2"> female</label>
            </td>

         </tr>
         <tr>
            <td> <input type="submit" value="Submit">
            </td>
            <td> <input type="reset" value="Reset">
            </td>
         </tr>
      </table>
   </form>
</body>

</html>
