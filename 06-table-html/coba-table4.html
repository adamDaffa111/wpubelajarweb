<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>table merging</title>
</head>

<body>
   <table border="1" cellpadding="10" cellspacing="0">
      <thead>
         <tr>
            <th>col 1</th>
            <th colspan="3">col 2</th>
         </tr>
      </thead>
      <tbody>
         <tr>
            <td rowspan="3"> 1, 1</td>
            <td colspan="2">1, 2</td>
            <td>1, 3</td>
         </tr>
         <tr>
            <td>2, 1</td>
            <td>2, 2</td>
            <td>2, 3</td>
         </tr>
         <tr>
            <td>3, 1</td>
            <td>3, 2</td>
            <td>3, 3</td>
         </tr>
      </tbody>
   </table>
</body>

</html>
