<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>coba list</title>
</head>

<body>
   <h2> ordered list / list terurut </h2>
   <ol type="I">
      <li>item 1</li>
      <li>item 2</li>
      <li>item 3</li>
      <li>item 4</li>
      <li>item 5</li>
   </ol>

   <h2> unordered list / list tidak terurut </h2>
   <ul type="circle">
      <li>item 1</li>
      <li>item 2</li>
      <li>item 3</li>
      <li>item 4</li>
      <li>item 5</li>
   </ul>
   <h2> description list / list yang memiliki deskripsi </h2>
   <dl>
      <dt>HTML</dt>
      <dd> hyper text markup language </dd>
      <dt>CSS</dt>
      <dd> Cascading style sheets </dd>
   </dl>
</body>

</html>
